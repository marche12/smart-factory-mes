<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>팩플로우 시스템 연동 다이어그램</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}
#canvas{width:100%;height:100vh}

/* Controls */
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:100;background:rgba(15,23,42,.9);padding:12px 20px;border-radius:16px;border:1px solid #334155;backdrop-filter:blur(10px)}
.ctrl-btn{background:#1E293B;color:#94A3B8;border:1px solid #334155;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.ctrl-btn:hover{background:#334155;color:#fff}
.ctrl-btn.active{background:#3B82F6;color:#fff;border-color:#3B82F6}
.ctrl-btn.play{background:#10B981;color:#fff;border-color:#10B981;min-width:80px}
.ctrl-btn.play:hover{background:#059669}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:.4}}

/* Info Panel */
.info{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.95);padding:16px 32px;border-radius:12px;border:1px solid #334155;text-align:center;z-index:100;backdrop-filter:blur(10px);min-width:500px}
.info h1{font-size:18px;font-weight:700;color:#F8FAFC;margin-bottom:4px}
.info p{font-size:13px;color:#94A3B8}
.info .step-title{font-size:15px;color:#60A5FA;font-weight:600;margin-top:8px;min-height:20px}

/* Legend */
.legend{position:fixed;top:20px;right:20px;background:rgba(15,23,42,.95);padding:14px 18px;border-radius:12px;border:1px solid #334155;z-index:100;font-size:12px}
.legend h3{font-size:13px;margin-bottom:8px;color:#CBD5E1}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:#94A3B8}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* Speed Control */
.speed{position:fixed;bottom:20px;right:20px;background:rgba(15,23,42,.95);padding:10px 14px;border-radius:10px;border:1px solid #334155;z-index:100;font-size:12px;color:#94A3B8}
</style>
</head>
<body>

<div class="info">
  <h1>팩플로우 MES+ERP 시스템 연동 다이어그램</h1>
  <p>모듈 간 데이터 흐름과 동기화 과정을 시각화합니다</p>
  <div class="step-title" id="stepTitle"></div>
</div>

<div class="legend">
  <h3>카테고리</h3>
  <div class="leg-item"><div class="leg-dot" style="background:#3B82F6"></div> 영업</div>
  <div class="leg-item"><div class="leg-dot" style="background:#10B981"></div> 생산</div>
  <div class="leg-item"><div class="leg-dot" style="background:#F59E0B"></div> 품질/설비</div>
  <div class="leg-item"><div class="leg-dot" style="background:#8B5CF6"></div> 자재/회계</div>
  <div class="leg-item"><div class="leg-dot" style="background:#EC4899"></div> 인사</div>
  <div class="leg-item"><div class="leg-dot" style="background:#06B6D4"></div> 경영분석</div>
  <div class="leg-item"><div class="leg-dot" style="background:#F97316"></div> 작업자</div>
  <div class="leg-item"><div class="leg-dot" style="background:#84CC16"></div> 전자결재</div>
  <div class="leg-item"><div class="leg-dot" style="background:#EF4444"></div> 시스템/마스터</div>
  <div style="margin-top:8px;border-top:1px solid #334155;padding-top:8px">
    <div class="leg-item"><div style="width:20px;height:2px;background:#3B82F6"></div> 데이터 흐름</div>
    <div class="leg-item"><div style="width:20px;height:2px;background:#F59E0B;border-top:2px dashed #F59E0B;height:0"></div> 참조</div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶ 재생</button>
  <button class="ctrl-btn" onclick="goStep(-1)">◀ 이전</button>
  <button class="ctrl-btn" onclick="goStep(1)">다음 ▶</button>
  <button class="ctrl-btn" onclick="showAll()">전체보기</button>
  <button class="ctrl-btn" onclick="resetView()">초기화</button>
  <button class="ctrl-btn" id="recBtn" onclick="toggleRecord()" style="background:#DC2626;color:#fff;border-color:#DC2626">● 녹화</button>
</div>

<div class="speed">속도: <input type="range" id="speedRange" min="500" max="3000" value="1500" style="width:80px;vertical-align:middle"> <span id="speedVal">1.5s</span></div>

<canvas id="canvas"></canvas>

<script>

var highlightNodes = [];
var time = 0;
var selectedNode = null; // clicked node id

}

// ============ STEP SCENARIOS ============
var steps = [
  {

// ============ RENDERING ============
function getNodePos(n){
  return {x: n.x * W, y: n.y * H};
}

function drawNode(n, highlight, pulse){
  var p = getNodePos(n);
  var w = 90, h = 40;
  var isHi = highlight;
  var alpha = isHi ? 1 : 0.3;

  ctx.save();

  // Subtle glow
  if(isHi && pulse){
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 8;
  }

  // Box
  ctx.globalAlpha = alpha;
  ctx.fillStyle = isHi ? n.color+'22' : '#1E293B';
  ctx.strokeStyle = isHi ? n.color : '#334155';
  ctx.lineWidth = isHi ? 2.5 : 1;
  roundRect(ctx, p.x-w/2, p.y-h/2, w, h, 10);
  ctx.fill();
  ctx.stroke();

  // Label
  ctx.fillStyle = isHi ? '#F8FAFC' : '#64748B';
  ctx.font = (isHi?'700':'500') + ' 12px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.label, p.x, p.y);

  ctx.restore();
}

function drawFlow(f, active){
  var fromNode = nodes.find(function(n){return n.id===f.from});
  var toNode = nodes.find(function(n){return n.id===f.to});
  if(!fromNode||!toNode) return;

  var p1 = getNodePos(fromNode);
  var p2 = getNodePos(toNode);
  var alpha = active ? 0.8 : 0.06;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Straight line
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.strokeStyle = active ? fromNode.color : '#334155';
  ctx.lineWidth = active ? 2 : 0.8;
  if(f.type==='read'){
    ctx.setLineDash([5,5]);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrow at 85% along the line
  if(active){
    var ax = p1.x + (p2.x-p1.x)*0.85;
    var ay = p1.y + (p2.y-p1.y)*0.85;
    var angle = Math.atan2(p2.y-p1.y, p2.x-p1.x);

    ctx.fillStyle = fromNode.color;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax-9*Math.cos(angle-0.4), ay-9*Math.sin(angle-0.4));
    ctx.lineTo(ax-9*Math.cos(angle+0.4), ay-9*Math.sin(angle+0.4));
    ctx.fill();

    // Label at midpoint
    ctx.globalAlpha = 0.9;
    ctx.font = '600 10px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    var lx = (p1.x+p2.x)/2;
    var ly = (p1.y+p2.y)/2;
    var tw = ctx.measureText(f.label).width + 8;
    ctx.fillStyle = 'rgba(15,23,42,0.85)';
    ctx.fillRect(lx-tw/2, ly-8, tw, 16);
    ctx.fillStyle = '#E2E8F0';
    ctx.fillText(f.label, lx, ly+1);

    // Data tag
    if(f.data){
      ctx.font = '400 9px "Segoe UI", sans-serif';
      ctx.fillStyle = fromNode.color+'99';
      ctx.fillText(f.data, lx, ly+13);
    }
  }

  ctx.restore();

  // Particles (straight line)
  if(active){
    spawnParticle(p1, p2, fromNode.color);
  }
}

function spawnParticle(p1, p2, color){
  if(Math.random()>0.03) return;
  particles.push({
    p1:p1, p2:p2,
    t: 0, speed: 0.008 + Math.random()*0.006,
    color: color, size: 3
  });
}

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p = particles[i];
    p.t += p.speed;
    if(p.t>1){particles.splice(i,1);continue}
    var t=p.t;
    var x = p.p1.x + (p.p2.x-p.p1.x)*t;
    var y = p.p1.y + (p.p2.y-p.p1.y)*t;

    ctx.save();
    ctx.globalAlpha = 1-t*0.5;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ============ MAIN LOOP ============
function render(){
  time += 0.016;
  ctx.clearRect(0,0,W,H);

  // Draw grid dots
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = '#64748B';
  for(var gx=0;gx<W;gx+=30){
    for(var gy=0;gy<H;gy+=30){
      ctx.fillRect(gx,gy,1,1);
    }
  }
  ctx.restore();

  // Determine active nodes and flows
  var hiNodes = {};
  var hiFlows = {};

  if(selectedNode){
    // Node click mode — show only flows connected to selectedNode
    hiNodes[selectedNode] = true;
    allFlows.forEach(function(f){
      if(f.from===selectedNode||f.to===selectedNode){
        hiFlows[f.from+'→'+f.to]=true;
        hiNodes[f.from]=true;
        hiNodes[f.to]=true;
      }
    });
  } else if(currentStep >= 0 && currentStep < steps.length){
    var step = steps[currentStep];
    step.highlight.forEach(function(id){hiNodes[id]=true});
    step.flowIds.forEach(function(f){hiFlows[f.from+'→'+f.to]=true});
  } else if(currentStep === -2){
    // Show all
    nodes.forEach(function(n){hiNodes[n.id]=true});
    allFlows.forEach(function(f){hiFlows[f.from+'→'+f.to]=true});
  }

  // Draw inactive flows first
  allFlows.forEach(function(f){
    var key = f.from+'→'+f.to;
    if(!hiFlows[key]) drawFlow(f, false);
  });

  // Draw active flows
  allFlows.forEach(function(f){
    var key = f.from+'→'+f.to;
    if(hiFlows[key]) drawFlow(f, true);
  });

  // Draw particles
  updateParticles();

  // Draw nodes
  nodes.forEach(function(n){
    var isHi = hiNodes[n.id] || currentStep===-1;
    drawNode(n, isHi, hiNodes[n.id]);
  });

  animFrame = setTimeout(render, 33);
}
render();

// ============ CONTROLS ============
var playTimer = null;

function togglePlay(){
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? '⏸ 일시정지' : '▶ 재생';
  document.getElementById('playBtn').classList.toggle('active', playing);
  if(playing){
    if(currentStep < 0 || currentStep >= steps.length-1) currentStep = -1;
    nextStep();
  } else {
    clearTimeout(playTimer);
  }
}

function nextStep(){
  if(!playing) return;
  currentStep++;
  if(currentStep >= steps.length){
    if(isRecording){
      // 녹화 중이면: 전체보기 3초 보여준 후 녹화 종료
      playing = false;
      document.getElementById('playBtn').textContent = '▶ 재생';
      document.getElementById('playBtn').classList.remove('active');
      currentStep = -2;
      document.getElementById('stepTitle').textContent = '전체 연동 구조 — 모든 데이터 흐름 표시';
      setTimeout(function(){ stopRecord(); }, 3000);
      return;
    }
    currentStep = 0;
  }
  updateStepUI();
  var speed = +document.getElementById('speedRange').value;
  playTimer = setTimeout(nextStep, speed);
}

function goStep(dir){
  playing = false;
  document.getElementById('playBtn').textContent = '▶ 재생';
  document.getElementById('playBtn').classList.remove('active');
  clearTimeout(playTimer);

  currentStep += dir;
  if(currentStep < 0) currentStep = steps.length-1;
  if(currentStep >= steps.length) currentStep = 0;
  updateStepUI();
}

function showAll(){
  playing = false;
  selectedNode = null;
  document.getElementById('playBtn').textContent = '▶ 재생';
  document.getElementById('playBtn').classList.remove('active');
  clearTimeout(playTimer);
  currentStep = -2;
  document.getElementById('stepTitle').textContent = '전체 연동 구조 — 모든 데이터 흐름 표시';
}

function resetView(){
  playing = false;
  selectedNode = null;
  document.getElementById('playBtn').textContent = '▶ 재생';
  document.getElementById('playBtn').classList.remove('active');
  clearTimeout(playTimer);
  currentStep = -1;
  particles = [];
  document.getElementById('stepTitle').textContent = '';
}

function updateStepUI(){
  if(currentStep >= 0 && currentStep < steps.length){
    var step = steps[currentStep];
    document.getElementById('stepTitle').innerHTML = step.title + '<br><span style="font-size:12px;color:#94A3B8;font-weight:400">' + step.desc + '</span>';
  }
}

document.getElementById('speedRange').addEventListener('input', function(){
  document.getElementById('speedVal').textContent = (this.value/1000).toFixed(1)+'s';
});

// ============ NODE CLICK ============
canvas.addEventListener('click', function(e){
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var clicked = null;
  var nw = 90, nh = 40;

  for(var i=0;i<nodes.length;i++){
    var n = nodes[i];
    var p = getNodePos(n);
    if(mx >= p.x-nw/2 && mx <= p.x+nw/2 && my >= p.y-nh/2 && my <= p.y+nh/2){
      clicked = n;
      break;
    }
  }

  if(clicked){
    // Stop auto-play
    playing = false;
    document.getElementById('playBtn').textContent = '▶ 재생';
    document.getElementById('playBtn').classList.remove('active');
    clearTimeout(playTimer);
    currentStep = -1;
    particles = [];

    if(selectedNode === clicked.id){
      // Toggle off
      selectedNode = null;
      document.getElementById('stepTitle').textContent = '';
    } else {
      selectedNode = clicked.id;
      // Count connected flows
      var inFlows = allFlows.filter(function(f){return f.to===clicked.id});
      var outFlows = allFlows.filter(function(f){return f.from===clicked.id});
      var info = clicked.label + ' 연동 구조';
      var detail = '수신 ' + inFlows.length + '개 / 송신 ' + outFlows.length + '개 데이터 흐름';
      document.getElementById('stepTitle').innerHTML = '<span style="color:'+clicked.color+';font-weight:700">'+info+'</span><br><span style="font-size:12px;color:#94A3B8;font-weight:400">'+detail+'</span>';
    }
  } else {
    // Click empty area — deselect
    if(selectedNode){
      selectedNode = null;
      document.getElementById('stepTitle').textContent = '';
    }
  }
});

// ===== 녹화 기능 =====
var mediaRecorder = null;
var recordedChunks = [];
var isRecording = false;

function toggleRecord(){
  if(isRecording){
    stopRecord();
  } else {
    startRecord();
  }
}

function startRecord(){
  recordedChunks = [];
  var stream = canvas.captureStream(30); // 30fps
  var options = {mimeType:'video/webm;codecs=vp9'};
  if(!MediaRecorder.isTypeSupported(options.mimeType)){
    options = {mimeType:'video/webm;codecs=vp8'};
    if(!MediaRecorder.isTypeSupported(options.mimeType)){
      options = {mimeType:'video/webm'};
    }
  }
  mediaRecorder = new MediaRecorder(stream, options);
  mediaRecorder.ondataavailable = function(e){
    if(e.data && e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = function(){
    var blob = new Blob(recordedChunks, {type:'video/webm'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'packflow-diagram-' + new Date().toISOString().slice(0,10) + '.webm';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  mediaRecorder.start(100);
  isRecording = true;
  var btn = document.getElementById('recBtn');
  btn.textContent = '■ 녹화중...';
  btn.style.animation = 'recBlink 1s infinite';

  // 자동 재생 시작
  if(!playing){
    resetView();
    setTimeout(function(){ togglePlay(); }, 300);
  }
}

function stopRecord(){
  if(mediaRecorder && mediaRecorder.state !== 'inactive'){
    mediaRecorder.stop();
  }
  isRecording = false;
  var btn = document.getElementById('recBtn');
  btn.textContent = '● 녹화';
  btn.style.animation = '';
}

// Hover cursor
canvas.addEventListener('mousemove', function(e){
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var nw = 90, nh = 40;
  var over = false;
  for(var i=0;i<nodes.length;i++){
    var p = getNodePos(nodes[i]);
    if(mx >= p.x-nw/2 && mx <= p.x+nw/2 && my >= p.y-nh/2 && my <= p.y+nh/2){
      over = true; break;
    }
  }
  canvas.style.cursor = over ? 'pointer' : 'default';
});
